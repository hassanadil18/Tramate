# ================================================================================
# TRAMATE PLATFORM - DOCKER COMPOSE CONFIGURATION
# ================================================================================
# Production-ready Docker Compose setup with all services
# 
# Quick start:
#   cp .env.example .env
#   docker-compose up -d
#
# Services included:
#   - Tramate Web Application (Rails)
#   - PostgreSQL Database
#   - Redis (for caching and background jobs)
#   - Nginx (reverse proxy and SSL termination)
# ================================================================================

version: '3.8'

services:
  # ================================================================================
  # DATABASE SERVICE - PostgreSQL
  # ================================================================================
  db:
    image: postgres:15-alpine
    container_name: tramate-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-tramate_production}
      POSTGRES_USER: ${DATABASE_USER:-tramate}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-tramate_secure_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-tramate} -d ${DATABASE_NAME:-tramate_production}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - tramate-network

  # ================================================================================
  # CACHE SERVICE - Redis
  # ================================================================================
  redis:
    image: redis:7-alpine
    container_name: tramate-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - tramate-network

  # ================================================================================
  # WEB APPLICATION SERVICE - Tramate Platform
  # ================================================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: tramate:latest
    container_name: tramate-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Rails Configuration
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      
      # Database Configuration
      DATABASE_URL: postgresql://${DATABASE_USER:-tramate}:${DATABASE_PASSWORD:-tramate_secure_password}@db:5432/${DATABASE_NAME:-tramate_production}
      
      # Redis Configuration
      REDIS_URL: redis://redis:6379/0
      
      # Application URLs
      APP_HOST: ${APP_HOST:-localhost}
      APP_PROTOCOL: ${APP_PROTOCOL:-https}
      
      # Email Configuration
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_DOMAIN: ${SMTP_DOMAIN}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@tramate.com}
      
      # External API Configuration
      BINANCE_API_URL: ${BINANCE_API_URL:-https://api.binance.com}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      
      # Payment Configuration
      CHECKOUT_SECRET_KEY: ${CHECKOUT_SECRET_KEY}
      CHECKOUT_PUBLIC_KEY: ${CHECKOUT_PUBLIC_KEY}
      CHECKOUT_ENVIRONMENT: ${CHECKOUT_ENVIRONMENT:-sandbox}
      
      # Security Configuration
      FORCE_SSL: ${FORCE_SSL:-true}
      
      # Performance Configuration
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      MAX_THREADS: ${MAX_THREADS:-5}
      
      # Monitoring
      LOG_LEVEL: ${LOG_LEVEL:-info}
      
    volumes:
      - app_storage:/rails/storage
      - app_logs:/rails/log
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "/rails/bin/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - tramate-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tramate.rule=Host(`${APP_HOST:-localhost}`)"
      - "traefik.http.services.tramate.loadbalancer.server.port=3000"

  # ================================================================================
  # REVERSE PROXY SERVICE - Nginx
  # ================================================================================
  nginx:
    image: nginx:alpine
    container_name: tramate-nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - app_storage:/var/www/storage:ro
    networks:
      - tramate-network
    labels:
      - "traefik.enable=false"

  # ================================================================================
  # BACKGROUND JOBS SERVICE - Sidekiq (if using background processing)
  # ================================================================================
  sidekiq:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: tramate:latest
    container_name: tramate-sidekiq
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DATABASE_URL: postgresql://${DATABASE_USER:-tramate}:${DATABASE_PASSWORD:-tramate_secure_password}@db:5432/${DATABASE_NAME:-tramate_production}
      REDIS_URL: redis://redis:6379/0
    command: ["bundle", "exec", "sidekiq"]
    volumes:
      - app_storage:/rails/storage
      - app_logs:/rails/log
    networks:
      - tramate-network

# ================================================================================
# PERSISTENT VOLUMES
# ================================================================================
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/postgres
  
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/redis
  
  app_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/storage
  
  app_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/logs

# ================================================================================
# NETWORKS
# ================================================================================
networks:
  tramate-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

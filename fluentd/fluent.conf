<source>
  @type tail
  @id input_tail
  <parse>
    @type json
    time_key time
    time_format %Y-%m-%dT%H:%M:%S.%NZ
  </parse>
  path /var/log/tramate/*.log
  pos_file /var/log/fluentd-tramate.log.pos
  tag tramate.*
  read_from_head true
</source>

<source>
  @type forward
  @id input_forward
</source>

<source>
  @type http
  @id input_http
  port 8080
</source>

# Filter for parsing Rails logs
<filter tramate.**>
  @type parser
  key_name message
  reserve_data true
  <parse>
    @type multi_format
    <pattern>
      format regexp
      expression /^(?<level>\w+),\s*\[(?<timestamp>[^\]]+)\]\s+(?<severity>\w+)\s+--\s*:\s+(?<message>.*)$/
    </pattern>
    <pattern>
      format json
    </pattern>
  </parse>
</filter>

# Add environment and service tags
<filter tramate.**>
  @type record_transformer
  <record>
    environment production
    service tramate
    host "#{Socket.gethostname}"
  </record>
</filter>

# Route to Elasticsearch
<match tramate.**>
  @type elasticsearch
  @id out_es
  @log_level info
  include_tag_key true
  host elasticsearch
  port 9200
  logstash_format true
  logstash_prefix tramate
  logstash_dateformat %Y.%m.%d
  include_timestamp true
  type_name _doc
  <buffer>
    @type file
    path /var/log/fluentd-buffers/tramate.buffer
    flush_thread_count 2
    flush_interval 5s
    chunk_limit_size 2M
    queue_limit_length 8
    retry_max_interval 30
    retry_forever true
  </buffer>
</match>

# System logs
<source>
  @type systemd
  @id in_systemd_docker
  matches [{ "_SYSTEMD_UNIT": "docker.service" }]
  <storage>
    @type local
    persistent true
    path /var/log/fluentd-systemd.pos
  </storage>
  <entry>
    fields_strip_underscores true
    fields_lowercase true
  </entry>
  tag systemd.docker
</source>

<match systemd.**>
  @type elasticsearch
  @id out_es_systemd
  host elasticsearch
  port 9200
  logstash_format true
  logstash_prefix systemd
  include_timestamp true
  type_name _doc
</match>

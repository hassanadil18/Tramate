# ================================================================================
# TRAMATE PLATFORM - NGINX SERVER CONFIGURATION
# ================================================================================
# Main server configuration with SSL termination and caching
# ================================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name _;
    
    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    
    # Root directory (for static files)
    root /var/www/public;
    
    # Logging
    access_log /var/log/nginx/tramate_access.log main;
    error_log /var/log/nginx/tramate_error.log;
    
    # Security headers specific to Tramate
    add_header X-App-Version "1.0.0" always;
    add_header X-Powered-By "Tramate Platform" always;
    
    # Static assets with long-term caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Served-By "nginx" always;
        
        # Try to serve from nginx first, then proxy to Rails
        try_files $uri @tramate_app;
    }
    
    # Health check endpoint (bypass rate limiting)
    location /health {
        proxy_pass http://tramate_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }
    
    # API endpoints with higher rate limits
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://tramate_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        # API-specific settings
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
    
    # Authentication endpoints with strict rate limiting
    location ~ ^/(auth|registration)/ {
        limit_req zone=login burst=10 nodelay;
        proxy_pass http://tramate_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }
    
    # Admin panel with IP restrictions (uncomment and configure as needed)
    # location /admin/ {
    #     allow 10.0.0.0/8;
    #     allow 172.16.0.0/12;
    #     allow 192.168.0.0/16;
    #     deny all;
    #     
    #     proxy_pass http://tramate_app;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    
    # WebSocket support for real-time features
    location /cable {
        proxy_pass http://tramate_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket specific timeouts
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
    
    # Main application
    location @tramate_app {
        limit_req zone=general burst=10 nodelay;
        proxy_pass http://tramate_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        # Timeout settings
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # HTTP version and connection reuse
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Error handling
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }
    
    # Default location
    location / {
        try_files $uri $uri/index.html @tramate_app;
    }
    
    # Security: Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ /(config|db|log|tmp|storage|bin)/ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Block common exploit attempts
    location ~ /(wp-admin|wp-login|phpMyAdmin|admin|administrator) {
        deny all;
        access_log off;
        log_not_found off;
        return 444;
    }
}
